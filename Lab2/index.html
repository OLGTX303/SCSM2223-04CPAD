<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Task Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Chapter 3 - Lab Exercise 2</p>
        <h1>My Task Board</h1>
        <p class="app-subtitle">Kanban task management with pure JavaScript DOM manipulation.</p>
      </div>

      <div class="header-tools">
        <div class="counter-badge" id="taskCounter">0 tasks</div>

        <label class="filter-group" for="priorityFilter">
          <span>Priority Filter</span>
          <select id="priorityFilter">
            <option value="all">All Priorities</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </label>
      </div>
    </header>

    <main class="board">
      <section id="todo" class="board-column">
        <div class="column-header">
          <div>
            <h2>To Do</h2>
            <p>Planned tasks waiting to start.</p>
          </div>
          <button type="button" class="add-task-btn" data-column="todo">Add Task</button>
        </div>
        <ul id="todoList" class="task-list" data-column-list="todo"></ul>
      </section>

      <section id="inprogress" class="board-column">
        <div class="column-header">
          <div>
            <h2>In Progress</h2>
            <p>Tasks currently being worked on.</p>
          </div>
          <button type="button" class="add-task-btn" data-column="inprogress">Add Task</button>
        </div>
        <ul id="inprogressList" class="task-list" data-column-list="inprogress"></ul>
      </section>

      <section id="done" class="board-column">
        <div class="column-header">
          <div>
            <h2>Done</h2>
            <p>Completed tasks ready to clear.</p>
          </div>
          <div class="column-actions">
            <button type="button" class="clear-done-btn" id="clearDoneBtn">Clear All</button>
            <button type="button" class="add-task-btn" data-column="done">Add Task</button>
          </div>
        </div>
        <ul id="doneList" class="task-list" data-column-list="done"></ul>
      </section>
    </main>
  </div>

  <div id="taskModal" class="modal is-hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">Add Task</h2>
        <button type="button" class="icon-btn" data-close-modal="true" aria-label="Close modal">X</button>
      </div>

      <form id="taskForm" class="task-form">
        <div class="form-group">
          <label for="taskTitle">Task Title</label>
          <input type="text" id="taskTitle" required>
        </div>

        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" rows="4"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>

          <div class="form-group">
            <label for="taskDueDate">Due Date</label>
            <input type="date" id="taskDueDate">
          </div>
        </div>

        <div class="form-group">
          <label for="taskColumn">Column</label>
          <select id="taskColumn">
            <option value="todo">To Do</option>
            <option value="inprogress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>

        <div class="modal-actions">
          <button type="submit" class="save-btn">Save</button>
          <button type="button" class="cancel-btn" id="cancelBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="taskmanager.js"></script>
</body>
</html>
